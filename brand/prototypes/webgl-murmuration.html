<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Red Rabbit — WebGL Murmuration (v3, scharf)</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#fff;color:#161616;font-family:Inter,system-ui,sans-serif;overflow:hidden;}
  #gl{position:fixed;inset:0;display:block;}
  .brand{position:fixed;left:30px;top:26px;font:500 15px/1 Inter;letter-spacing:.04em;}
  .brand b{color:#E5342B;font-weight:600;}
  .tag{position:fixed;right:30px;top:26px;font:500 11px/1 Inter;letter-spacing:.16em;text-transform:uppercase;color:#7a7a78;border:1px solid #e6e6e3;border-radius:999px;padding:8px 14px;}
  .cap{position:fixed;left:30px;bottom:26px;max-width:32ch;}
  .cap h1{font-family:Fraunces;font-weight:600;font-size:clamp(28px,3.4vw,46px);line-height:1.0;margin:0 0 8px;letter-spacing:-.01em;}
  .cap p{margin:0;color:#7a7a78;font-size:14px;line-height:1.5;}
  .err{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#7a7a78;font-size:14px;padding:40px;text-align:center;}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<span class="brand"><b>red</b> rabbit<span style="color:#7a7a78"> media</span></span>
<span class="tag">Prototyp v3 · WebGL</span>
<div class="cap"><h1>Bewegung, die<br>auffällt.</h1><p>15.000 Partikel strömen, formen den Hasen, lösen sich und setzen sich neu. Maus bewegen.</p></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
if(!window.THREE){document.body.innerHTML='<div class="err">Three.js konnte nicht geladen werden (Internet nötig). Bitte mit Verbindung erneut öffnen.</div>';return;}
const cv=document.getElementById('gl');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
renderer.setClearColor(0xffffff,0);renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,100);camera.position.set(0,0,3.3);
function inHead(x,y){function el(px,py,rx,ry,r){const c=Math.cos(-r),s=Math.sin(-r),dx=x-px,dy=y-py,ux=dx*c-dy*s,uy=dx*s+dy*c;return (ux*ux)/(rx*rx)+(uy*uy)/(ry*ry)<=1;}
  return el(0,0.14,0.46,0.42,0)||el(-0.21,-0.52,0.10,0.46,-0.16)||el(0.21,-0.52,0.10,0.46,0.16);}
function inRing(x,y){const d=Math.hypot(x,y);return d<=0.48&&d>=0.34;}
function samp(test){let x,y,a=0;do{x=Math.random()*2-1;y=Math.random()*2-1;a++;}while(!test(x,y)&&a<500);return [x,y];}
const N=15000;
const head=new Float32Array(N*3),target=new Float32Array(N*3),rnd=new Float32Array(N);
const hC=[-0.5,0.42],tC=[0.55,-0.42];
for(let i=0;i<N;i++){const h=samp(inHead),t=samp(inRing);
  head[i*3]=h[0]*0.95+hC[0];head[i*3+1]=h[1]*0.95+hC[1];head[i*3+2]=(Math.random()-0.5)*0.14;
  target[i*3]=t[0]*0.95+tC[0];target[i*3+1]=t[1]*0.95+tC[1];target[i*3+2]=(Math.random()-0.5)*0.14;
  rnd[i]=Math.random();}
const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(head.slice(),3));
geo.setAttribute('aHead',new THREE.BufferAttribute(head,3));
geo.setAttribute('aTarget',new THREE.BufferAttribute(target,3));
geo.setAttribute('aRnd',new THREE.BufferAttribute(rnd,1));
const vert=`
attribute vec3 aHead;attribute vec3 aTarget;attribute float aRnd;
uniform float uMorph;uniform float uDisp;uniform float uTime;uniform float uSize;
varying float vA;
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
 vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
 vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
 vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;i=mod(i,289.0);
 vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
 float n_=1.0/7.0;vec3 ns=n_*D.wyz-D.xzx;vec4 j=p-49.0*floor(p*ns.z*ns.z);
 vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);
 vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));
 vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
 vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
 vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
 vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
 return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));}
vec3 snv(vec3 p){return vec3(snoise(p),snoise(p+17.1),snoise(p+43.7));}
vec3 curl(vec3 p){float e=0.2;vec3 dx=vec3(e,0.,0.),dy=vec3(0.,e,0.),dz=vec3(0.,0.,e);
 vec3 px0=snv(p-dx),px1=snv(p+dx),py0=snv(p-dy),py1=snv(p+dy),pz0=snv(p-dz),pz1=snv(p+dz);
 float x=(py1.z-py0.z)-(pz1.y-pz0.y);float y=(pz1.x-pz0.x)-(px1.z-px0.z);float z=(px1.y-px0.y)-(py1.x-py0.x);
 return normalize(vec3(x,y,z)+0.0001);}
void main(){
 vec3 base=mix(aHead,aTarget,uMorph);
 vec3 flow=curl(base*1.1+vec3(0.0,0.0,uTime*0.1)+aRnd*4.0);
 float amb=0.012;
 vec3 pos=base+flow*(amb+uDisp*(0.4+aRnd*0.8));
 vec4 mv=modelViewMatrix*vec4(pos,1.0);
 gl_PointSize=uSize*(0.6+aRnd*0.9)*(1.0/ -mv.z);
 gl_Position=projectionMatrix*mv;
 vA=0.4+0.6*aRnd;
}`;
const frag=`precision mediump float;uniform vec3 uColor;varying float vA;
void main(){float d=length(gl_PointCoord-0.5);float a=smoothstep(0.5,0.18,d);if(a<=0.02)discard;gl_FragColor=vec4(uColor,a*vA);}`;
const mat=new THREE.ShaderMaterial({uniforms:{uMorph:{value:0},uDisp:{value:0},uTime:{value:0},uSize:{value:14.0},uColor:{value:new THREE.Color(0xE5342B)}},vertexShader:vert,fragmentShader:frag,transparent:true,depthWrite:false,blending:THREE.NormalBlending});
const pts=new THREE.Points(geo,mat);scene.add(pts);
const ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
let mx=0,my=0;addEventListener('pointermove',e=>{mx=(e.clientX/innerWidth-0.5);my=(e.clientY/innerHeight-0.5);});
function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
addEventListener('resize',resize);resize();
function state(ph){
 if(ph<0.30)return [0,0];
 if(ph<0.46){const t=ease((ph-0.30)/0.16);return [t,Math.sin(t*Math.PI)];}
 if(ph<0.74)return [1,0];
 if(ph<0.90){const t=ease((ph-0.74)/0.16);return [1-t,Math.sin(t*Math.PI)];}
 return [0,0];
}
function loop(now){
 const T=12000;const ph=(now%T)/T;const st=state(ph);
 mat.uniforms.uMorph.value=st[0];mat.uniforms.uDisp.value=st[1]*0.6;mat.uniforms.uTime.value=now*0.001;
 pts.rotation.y+=((mx*0.45)-pts.rotation.y)*0.05;pts.rotation.x+=((my*0.28)-pts.rotation.x)*0.05;
 camera.position.x+=((mx*0.35)-camera.position.x)*0.05;camera.lookAt(0,0,0);
 renderer.render(scene,camera);requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
